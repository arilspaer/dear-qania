<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pesan Romantis Lucu</title>

  <style>
    :root {
      --bg-1: #ffe4ec;
      --bg-2: #ffd1dc;
      --pink-main: #ff7aa8;
      --pink-dark: #e84f89;
      --pink-soft: #fff0f5;
      --envelope-front: #ff9fbd;
      --envelope-back: #ffb6cc;
      --envelope-flap: #ff7fa8;
      --paper: #fffafc;
      --text: #7a2848;
      --white: #ffffff;
      --shadow: rgba(201, 64, 112, 0.28);
      --button-shadow: rgba(232, 79, 137, 0.35);
      --radius-xl: 28px;
      --transition-smooth: 0.75s cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #fff6fa 0 18%, transparent 38%),
        radial-gradient(circle at bottom right, #ffc1d7 0 16%, transparent 36%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      width: min(100%, 430px);
      height: 100vh;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .floating-hearts {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .heart {
      position: absolute;
      width: 18px;
      height: 18px;
      background: rgba(255, 122, 168, 0.35);
      transform: rotate(45deg);
      animation: floatHeart 7s linear infinite;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: inherit;
    }

    .heart::before {
      left: -9px;
      top: 0;
    }

    .heart::after {
      top: -9px;
      left: 0;
    }

    .heart:nth-child(1) {
      left: 12%;
      bottom: -30px;
      animation-delay: 0s;
      animation-duration: 8s;
    }

    .heart:nth-child(2) {
      left: 78%;
      bottom: -40px;
      animation-delay: 1.5s;
      animation-duration: 7s;
      transform: rotate(45deg) scale(0.8);
    }

    .heart:nth-child(3) {
      left: 46%;
      bottom: -35px;
      animation-delay: 3s;
      animation-duration: 9s;
      transform: rotate(45deg) scale(1.15);
    }

    .heart:nth-child(4) {
      left: 25%;
      bottom: -45px;
      animation-delay: 4.5s;
      animation-duration: 7.5s;
      transform: rotate(45deg) scale(0.7);
    }

    .content {
      width: 100%;
      min-height: 430px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2;
      position: relative;
    }

    .envelope-scene {
      width: min(82vw, 320px);
      height: 300px;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      transition:
        opacity 0.65s ease,
        transform 0.65s ease,
        visibility 0.65s ease;
    }

    .envelope-scene.hide {
      opacity: 0;
      transform: translateY(24px) scale(0.92);
      visibility: hidden;
    }

    .envelope {
      width: 280px;
      height: 180px;
      position: relative;
      filter: drop-shadow(0 18px 22px var(--shadow));
      animation: softBounce 2.8s ease-in-out infinite;
    }

    .letter {
      width: 225px;
      min-height: 160px;
      position: absolute;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(74px);
      background: var(--paper);
      border-radius: 18px;
      padding: 22px 18px;
      text-align: center;
      box-shadow: 0 10px 24px rgba(122, 40, 72, 0.12);
      z-index: 2;
      opacity: 0;
      transition:
        transform 1s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.55s ease;
    }

    .letter::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 2px dashed rgba(255, 122, 168, 0.35);
      border-radius: 14px;
      pointer-events: none;
    }

    .letter-title {
      font-size: 1rem;
      font-weight: 800;
      margin-bottom: 10px;
      color: var(--pink-dark);
      position: relative;
      z-index: 1;
    }

    .letter-text {
      font-size: 0.92rem;
      line-height: 1.55;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }

    .envelope.open .letter {
      transform: translateX(-50%) translateY(-118px);
      opacity: 1;
      transition-delay: 0.35s;
    }

    .envelope-back {
      position: absolute;
      inset: 0;
      background: var(--envelope-back);
      border-radius: 0 0 22px 22px;
      z-index: 1;
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
    }

    .envelope-flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 280px;
      height: 100px;
      background: var(--envelope-flap);
      clip-path: polygon(0 0, 50% 100%, 100% 0);
      transform-origin: top center;
      z-index: 5;
      transition: transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .envelope.open .envelope-flap {
      transform: rotateX(180deg);
      z-index: 0;
    }

    .envelope-front {
      position: absolute;
      inset: 0;
      z-index: 4;
      border-radius: 0 0 22px 22px;
      overflow: hidden;
    }

    .envelope-front::before,
    .envelope-front::after {
      content: "";
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100%;
      background: var(--envelope-front);
    }

    .envelope-front::before {
      left: 0;
      clip-path: polygon(0 0, 50% 58%, 0 100%);
    }

    .envelope-front::after {
      right: 0;
      clip-path: polygon(100% 0, 50% 58%, 100% 100%);
    }

    .envelope-bottom {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 280px;
      height: 120px;
      background: #ff8eb1;
      clip-path: polygon(0 100%, 50% 26%, 100% 100%);
      z-index: 6;
      border-radius: 0 0 22px 22px;
    }

    .seal {
      position: absolute;
      left: 50%;
      bottom: 62px;
      width: 44px;
      height: 44px;
      background: var(--pink-dark);
      border-radius: 50%;
      transform: translateX(-50%);
      z-index: 7;
      display: grid;
      place-items: center;
      color: var(--white);
      font-size: 1.15rem;
      box-shadow: 0 8px 16px rgba(232, 79, 137, 0.32);
      transition: transform 0.45s ease, opacity 0.45s ease;
    }

    .envelope.open .seal {
      transform: translateX(-50%) scale(0);
      opacity: 0;
    }

    .photo-card {
      width: min(86vw, 330px);
      padding: 16px;
      background: rgba(255, 250, 252, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: var(--radius-xl);
      box-shadow: 0 22px 42px rgba(201, 64, 112, 0.24);
      text-align: center;
      position: absolute;
      top: 50%;
      left: 50%;
      opacity: 0;
      visibility: hidden;
      transform: translate(-50%, -50%) scale(0.82);
      transition:
        opacity 0.8s ease,
        transform 0.8s cubic-bezier(0.22, 1, 0.36, 1),
        visibility 0.8s ease;
      z-index: 3;
    }

    .photo-card.show {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }

    .photo-frame {
      width: 100%;
      aspect-ratio: 4 / 5;
      border-radius: 22px;
      overflow: hidden;
      background: linear-gradient(135deg, #ffd6e4, #fff5f8);
      border: 8px solid var(--white);
      box-shadow: inset 0 0 0 1px rgba(232, 79, 137, 0.14);
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .caption {
      margin-top: 16px;
      font-size: 1rem;
      line-height: 1.5;
      font-weight: 700;
      color: var(--text);
    }

    .caption span {
      color: var(--pink-dark);
    }

    .action-button {
      margin-top: 26px;
      min-width: 178px;
      min-height: 52px;
      border: 0;
      border-radius: 999px;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--pink-main), var(--pink-dark));
      color: var(--white);
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.2px;
      cursor: pointer;
      box-shadow: 0 12px 24px var(--button-shadow);
      position: relative;
      z-index: 5;
      transition:
        transform 0.25s ease,
        opacity 0.45s ease,
        visibility 0.45s ease,
        box-shadow 0.25s ease;
    }

    .action-button:active {
      transform: scale(0.95);
      box-shadow: 0 8px 16px var(--button-shadow);
    }

    .action-button.hide {
      opacity: 0;
      visibility: hidden;
      transform: translateY(12px) scale(0.92);
      pointer-events: none;
    }

    .sparkle {
      position: absolute;
      width: 7px;
      height: 7px;
      background: var(--white);
      border-radius: 50%;
      box-shadow: 0 0 12px #ffffff;
      animation: twinkle 2.4s ease-in-out infinite;
      z-index: 1;
    }

    .sparkle:nth-of-type(1) {
      top: 16%;
      left: 17%;
      animation-delay: 0.2s;
    }

    .sparkle:nth-of-type(2) {
      top: 27%;
      right: 15%;
      animation-delay: 0.8s;
    }

    .sparkle:nth-of-type(3) {
      bottom: 22%;
      left: 20%;
      animation-delay: 1.3s;
    }

    @keyframes softBounce {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes floatHeart {
      0% {
        transform: translateY(0) rotate(45deg) scale(0.85);
        opacity: 0;
      }

      15% {
        opacity: 1;
      }

      100% {
        transform: translateY(-110vh) rotate(45deg) scale(1.25);
        opacity: 0;
      }
    }

    @keyframes twinkle {
      0%, 100% {
        transform: scale(0.7);
        opacity: 0.35;
      }

      50% {
        transform: scale(1.35);
        opacity: 1;
      }
    }

    @media (max-width: 360px) {
      .page {
        padding-inline: 14px;
      }

      .envelope-scene {
        width: 300px;
        height: 285px;
      }

      .envelope {
        width: 250px;
        height: 160px;
      }

      .envelope-flap,
      .envelope-bottom {
        width: 250px;
      }

      .letter {
        width: 205px;
        min-height: 150px;
        padding: 20px 16px;
      }

      .envelope.open .letter {
        transform: translateX(-50%) translateY(-108px);
      }

      .letter-text {
        font-size: 0.86rem;
      }

      .photo-card {
        width: min(88vw, 300px);
      }
    }

    @media (max-height: 650px) {
      .content {
        min-height: 390px;
      }

      .envelope-scene {
        height: 270px;
      }

      .envelope.open .letter {
        transform: translateX(-50%) translateY(-102px);
      }

      .action-button {
        margin-top: 18px;
      }

      .photo-card {
        width: min(78vw, 290px);
      }

      .photo-frame {
        aspect-ratio: 1 / 1;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="floating-hearts" aria-hidden="true">
      <span class="heart"></span>
      <span class="heart"></span>
      <span class="heart"></span>
      <span class="heart"></span>
    </div>

    <span class="sparkle"></span>
    <span class="sparkle"></span>
    <span class="sparkle"></span>

    <section class="content" aria-label="Pesan romantis">
      <div class="envelope-scene" id="envelopeScene">
        <div class="envelope" id="envelope">
          <div class="letter">
            <!-- EDIT TEKS PESAN DI SINI -->
            <h1 class="letter-title">Hai QANIA</h1>
            <p class="letter-text">
             Semangat Mondok yaa
            </p>
            <!-- AKHIR TEKS PESAN -->
          </div>

          <div class="envelope-back"></div>
          <div class="envelope-flap"></div>
          <div class="envelope-front"></div>
          <div class="envelope-bottom"></div>
          <div class="seal">♡</div>
        </div>
      </div>

      <article class="photo-card" id="photoCard">
        <div class="photo-frame">
          <!-- GANTI URL FOTO DI BAGIAN src DI BAWAH INI -->
          <img
            src="first-time-ever.jpeg"
            alt="for_my_future"
          />
          <!-- AKHIR URL FOTO -->
        </div>

        <!-- EDIT CAPTION FOTO DI SINI -->
        <p class="caption">
          our first time ever taking a picture together since we were kids hahaha
          <span>lucu banget qania</span> 
        </p>
        <!-- AKHIR CAPTION FOTO -->
      </article>

      <button class="action-button" id="actionButton" type="button">
        TAP INI QANIA
      </button>
    </section>
  </main>

  <script>
    const envelope = document.getElementById("envelope");
    const envelopeScene = document.getElementById("envelopeScene");
    const photoCard = document.getElementById("photoCard");
    const actionButton = document.getElementById("actionButton");

    let step = 0;
    let isAnimating = false;

    actionButton.addEventListener("click", () => {
      if (isAnimating) return;

      if (step === 0) {
        isAnimating = true;

        envelope.classList.add("open");

        setTimeout(() => {
          actionButton.textContent = "TAP LAGI";
          step = 1;
          isAnimating = false;
        }, 1150);

        return;
      }

      if (step === 1) {
        isAnimating = true;

        envelopeScene.classList.add("hide");

        setTimeout(() => {
          photoCard.classList.add("show");
          actionButton.classList.add("hide");
          step = 2;
        }, 520);
      }
    });
  </script>
</body>
</html>
